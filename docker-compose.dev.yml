name: codex-pooler-dev

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: codex_pooler_dev
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d codex_pooler_dev
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - codex-pooler-postgres:/var/lib/postgresql

volumes:
  codex-pooler-postgres:
